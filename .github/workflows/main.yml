name: Build TWRP 32-bit (Fixed)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Recovery
        uses: phantom-cat/twrp-builder@main
        with:
          manifest_url: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git
          manifest_branch: twrp-9.0
          device_tree: https://github.com/salimalqaaod1-lgtm/twrp_device_m7332
          device_name: m7332
          makefile_name: omni_m7332
          target: recovery

      - name: Upload Recovery
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-m7332-Result
          path: |
            out/target/product/m7332/*.img
            out/target/product/m7332/*.zip

