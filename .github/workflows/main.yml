name: Build TWRP for MT9632 (Final Fix)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools & Fix Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev pngcrush schedtool squashfs-tools zlib1g-dev libxml2-utils
          # حل مشكلة مكتبات ncurses القديمة المطلوبة لأندرويد 11
          sudo wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.2-0ubuntu2_amd64.deb && sudo dpkg -i libtinfo5_6.2-0ubuntu2_amd64.deb
          sudo wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.2-0ubuntu2_amd64.deb && sudo dpkg -i libncurses5_6.2-0ubuntu2_amd64.deb

      - name: Sync TWRP Minimal Manifest
        run: |
          mkdir ~/twrp && cd ~/twrp
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo && sudo mv ~/repo /usr/local/bin/repo
          # استخدام TWRP 11
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Clone & Patch Device Tree
        run: |
          cd ~/twrp
          # إنشاء المسار الصحيح ووضع الملفات فيه
          mkdir -p device/mediatek/m7332
          git clone https://github.com/salimalqaaod1-lgtm/twrp_device_m7332 device/mediatek/m7332
          
          cd device/mediatek/m7332
          # 1. حذف الملف الذي يسبب تعارض في بداية التشغيل
          rm -f vendorsetup.sh
          
          # 2. حذف استدعاء ملفات OmniROM المفقودة لتجنب خطأ dumpvars
          sed -i '/vendor\/omni/d' *.mk || true
          
          # 3. تصحيح المسارات الداخلية لتعمل مع المجلد الجديد
          sed -i 's|device/m7332|device/mediatek/m7332|g' *.mk || true
          
          # 4. تغيير الإعدادات لتعمل بنظام الـ Minimal (32-bit)
          sed -i 's/core_64bit.mk/core_minimal.mk/g' omni_m7332.mk || true

      - name: Build TWRP Recovery
        run: |
          cd ~/twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C
          source build/envsetup.sh
          # اختيار المنتج
          lunch omni_m7332-eng || { echo "Lunch failed!"; ls -R device/mediatek/m7332; exit 1; }
          # أمر البناء النهائي
          make recoveryimage -j$(nproc --all)

      - name: Upload Recovery Image
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-m7332-Final
          path: |
            ~/twrp/out/target/product/m7332/recovery.img
            ~/twrp/out/target/product/m7332/dtb.img
